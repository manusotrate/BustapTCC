<ion-content [fullscreen]="true" class="tickets-content">

  <div class="header-container">
    <div class="header-gradient">
      <div class="top-section">
        <div class="avatar">
          <ion-icon name="person"></ion-icon>
        </div>
        <div class="top-actions">
          <ion-button fill="clear" color="light" (click)="home()">
            <ion-icon slot="icon-only" name="close-outline"></ion-icon>
          </ion-button>
          <ion-button fill="clear" color="light" (click)="historico()">
            <ion-icon slot="icon-only" name="hourglass-outline"></ion-icon>
          </ion-button>
          <ion-button fill="clear" color="light" (click)="logout()">
            <ion-icon slot="icon-only" name="log-out-outline"></ion-icon>
          </ion-button>
        </div>
      </div>
    </div>
  </div>

  <div class="menu-container">

    <div class="chevron-wrapper">
      <ion-icon name="chevron-down-outline" class="chevron-icon"></ion-icon>
    </div>

    <h2 class="page-title">Esses são seus<br>tickets :D</h2>

    <div class="tickets-list">

      <div class="ticket-card" *ngFor="let ticket of tickets">
        <div class="ticket-top">
          <ion-icon name="ticket-outline" class="ticket-icon"></ion-icon>
          <div class="ticket-info">
            <span class="ticket-duration">{{ ticket.minutos }} Min</span>
            <span class="ticket-remaining">{{ ticket.quantidade }} Restante</span>
          </div>
        </div>
        <button class="usar-btn" (click)="usarTicket(ticket)">Usar</button>
      </div>

    </div>

    <div class="buy-button-wrapper">
      <button class="buy-btn" (click)="comprar()">Compre mais tickets aqui!!!</button>
    </div>

  </div>

</ion-content>
