<ion-header>
  <ion-toolbar>
    <div class="avatar" slot="start">
      <ion-icon name="person"></ion-icon>
    </div>
    <ion-buttons slot="end">
      <ion-button fill="clear" color="light" routerLink="/tickets">
        <ion-icon slot="icon-only" name="ticket-outline"></ion-icon>
      </ion-button>
      <ion-button fill="clear" color="light" routerLink="/historico">
        <ion-icon slot="icon-only" name="time-outline"></ion-icon>
      </ion-button>
      <ion-button fill="clear" color="light" (click)="logout()">
        <ion-icon slot="icon-only" name="log-out-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="tickets-content">

  <div class="page-title">
    <h1>Esses são seus<br />tickets :D</h1>
  </div>

  <div class="tickets-list">

    <div class="ticket-card" *ngFor="let ticket of tickets">
      <div class="ticket-info">
        <span class="ticket-remaining">{{ ticket.quantidade }} Restante</span>
        <ion-icon name="ticket-outline" class="ticket-icon"></ion-icon>
        <span class="ticket-duration">{{ ticket.duracao }}</span>
      </div>
      <button class="usar-btn" (click)="usarTicket(ticket)">Usar!</button>
    </div>

  </div>

  <div class="buy-button-wrapper">
    <button class="buy-btn">Compre mais tickets aqui!!!</button>
  </div>

</ion-content>
