<ion-content [fullscreen]="true" class="tickets-content">

  <div class="header-container">
    <div class="header-gradient">
      <div class="top-section">
        <div class="avatar">
          <ion-icon name="person"></ion-icon>
        </div>
        <div class="top-actions">
          <ion-button fill="clear" color="light" (click)="home()">
            <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
          </ion-button>
          <ion-button fill="clear" color="light" (click)="historico()">
            <ion-icon slot="icon-only" name="hourglass-outline"></ion-icon>
          </ion-button>
          <ion-button fill="clear" color="light" (click)="logout()">
            <ion-icon slot="icon-only" name="log-out-outline"></ion-icon>
          </ion-button>
        </div>
      </div>
    </div>
  </div>

  <div class="menu-container">

    <h2 class="page-title">Esses são seus tickets :D</h2>

    <div class="tickets-list">

      <div class="ticket-card">
        <div class="ticket-info">
          <div class="ticket-remaining">2 Restante</div>
          <div class="ticket-icon">
            <ion-icon name="ticket-outline"></ion-icon>
          </div>
          <div class="ticket-duration">30 Min</div>
        </div>
        <button class="usar-btn">Usar!</button>
      </div>

      <div class="ticket-card">
        <div class="ticket-info">
          <div class="ticket-remaining">6 Restante</div>
          <div class="ticket-icon">
            <ion-icon name="ticket-outline"></ion-icon>
          </div>
          <div class="ticket-duration">1 Hora</div>
        </div>
        <button class="usar-btn">Usar!</button>
      </div>

      <div class="ticket-card">
        <div class="ticket-info">
          <div class="ticket-remaining">1 Restante</div>
          <div class="ticket-icon">
            <ion-icon name="ticket-outline"></ion-icon>
          </div>
          <div class="ticket-duration">2 Horas</div>
        </div>
        <button class="usar-btn">Usar!</button>
      </div>

    </div>

    <div class="buy-button-wrapper">
      <button class="buy-btn">Compre mais tickets aqui!!!</button>
    </div>

  </div>

</ion-content>
