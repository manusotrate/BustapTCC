<ion-header>
  <ion-toolbar>
    <ion-avatar slot="start">
      <img src="assets/avatar-placeholder.png" alt="User" />
    </ion-avatar>
    <ion-buttons slot="end">
      <ion-button>
        <ion-icon name="ticket-outline"></ion-icon>
      </ion-button>
      <ion-button>
        <ion-icon name="time-outline"></ion-icon>
      </ion-button>
      <ion-button>
        <ion-icon name="log-out-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="tickets-content">
  <div class="page-title">
    <h1>Esses são seus<br />tickets :D</h1>
  </div>

  <div class="tickets-list">

    <!-- Ticket 30 Min -->
    <div class="ticket-card">
      <div class="ticket-info">
        <div class="ticket-remaining">2 Restante</div>
        <div class="ticket-icon">
          <ion-icon name="ticket-outline"></ion-icon>
        </div>
        <div class="ticket-duration">30 Min</div>
      </div>
      <button class="usar-btn">Usar!</button>
    </div>

    <!-- Ticket 1 Hora -->
    <div class="ticket-card">
      <div class="ticket-info">
        <div class="ticket-remaining">6 Restante</div>
        <div class="ticket-icon">
          <ion-icon name="ticket-outline"></ion-icon>
        </div>
        <div class="ticket-duration">1 Hora</div>
      </div>
      <button class="usar-btn">Usar!</button>
    </div>

    <!-- Ticket 2 Horas -->
    <div class="ticket-card">
      <div class="ticket-info">
        <div class="ticket-remaining">1 Restante</div>
        <div class="ticket-icon">
          <ion-icon name="ticket-outline"></ion-icon>
        </div>
        <div class="ticket-duration">2 Horas</div>
      </div>
      <button class="usar-btn">Usar!</button>
    </div>

  </div>

  <div class="buy-button-wrapper">
    <button class="buy-btn">Compre mais tickets aqui!!!</button>
  </div>
</ion-content>
