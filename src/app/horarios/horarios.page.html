<ion-content [fullscreen]="true" class="horarios-content">
  <div class="container">
    <div class="back-btn" (click)="goBack()">
      <ion-icon name="arrow-back-outline"></ion-icon>
    </div>

    <h1 class="title">
      Quais locais<br>
      <strong>você deseja chegar?</strong>
    </h1>

    <div class="form-group">
      <label class="field-label">Local de partida</label>
      <div class="select-wrapper" [class.selected]="localPartida" (click)="abrirSeletor('partida')">
        <span class="select-text" [class.placeholder]="!localPartida">
          {{ localPartida?.nome || 'Selecione' }}
        </span>
        <ion-icon name="chevron-down-outline" class="select-icon"></ion-icon>
      </div>
    </div>

    <div class="form-group">
      <label class="field-label">Local de chegada</label>
      <div class="select-wrapper" [class.selected]="localChegada" (click)="abrirSeletor('chegada')">
        <span class="select-text" [class.placeholder]="!localChegada">
          {{ localChegada?.nome || 'Selecione' }}
        </span>
        <ion-icon name="chevron-down-outline" class="select-icon"></ion-icon>
      </div>
    </div>

    <!-- Distância em km -->
    <div class="distancia-section" *ngIf="localPartida && localChegada">
      <span class="distancia-label">Distância da rota</span>
      <div class="distancia-row">
        <ion-icon name="navigate-outline" class="distancia-icon"></ion-icon>
        <span class="distancia-valor">{{ distanciaFormatada }}</span>
      </div>
      <p class="distancia-hint" *ngIf="distanciaKm > 0">
        Você precisará de um ticket de pelo menos <strong>{{ distanciaKm }} km</strong>
      </p>
    </div>

    <button
      class="btn-comecar"
      (click)="comecarViagem()"
      [disabled]="!localPartida || !localChegada || distanciaKm === 0"
    >
      Escolher ticket
      <ion-icon name="arrow-forward-outline"></ion-icon>
    </button>
  </div>
</ion-content>
