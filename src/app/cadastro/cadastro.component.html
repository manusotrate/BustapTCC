<ion-content>
  <ion-card>
    <ion-card-header>
      <ion-card-title>Bem vindo à sua carteirinha digital!</ion-card-title>
      <ion-card-subtitle>Faça login ou cadastre-se para continuar.</ion-card-subtitle>
    </ion-card-header>

    <form [formGroup]="registrationForm" (ngSubmit)="onSubmit()">
      <ion-item>
        <ion-input placeholder="Nome" formControlName="nome" type="text"></ion-input>
      </ion-item>

      <ion-item>
        <ion-input placeholder="Sobrenome" formControlName="sobrenome" type="text"></ion-input>
      </ion-item>

      <ion-item>
        <ion-input placeholder="Email" formControlName="email" type="email"></ion-input>
      </ion-item>

      <ion-item>
        <ion-input placeholder="CPF" formControlName="cpf" (ionInput)="formatCPF($event)" type="text"></ion-input>
      </ion-item>

      <ion-item>
        <ion-input placeholder="Senha" formControlName="senha" type="password"></ion-input>
      </ion-item>

      <ion-button expand="full" type="submit">Cadastrar</ion-button>
    </form>

    <ion-text>Já possui cadastro?</ion-text>
    <ion-text class="cadastro" (click)="gologin()">Clique aqui</ion-text>
  </ion-card>
</ion-content>
