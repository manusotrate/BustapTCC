<ion-content>
  <ion-card>
    <ion-card-header>
      <ion-card-title>Bem vindo ao Bustap!</ion-card-title>
      <ion-card-subtitle>Faça login ou cadastre-se para continuar.</ion-card-subtitle>
    </ion-card-header>

    <form [formGroup]="registrationForm" (ngSubmit)="onSubmit()">
      
      <div class="nsei">
        <ion-item>
          <ion-input 
            class="nome animated-input" 
            placeholder="Nome"
            formControlName="nome"
            type="text"
            (input)="onInput($event)">
          </ion-input>
        </ion-item>

        <ion-item>
          <ion-input 
            class="animated-input"
            placeholder="Sobrenome"
            formControlName="sobrenome"
            type="text"
            (input)="onInput($event)">
          </ion-input>
        </ion-item>
      </div>

      <ion-item>
        <ion-input 
          class="animated-input" 
          placeholder="Email"
          formControlName="email"
          type="email"
          (input)="onInput($event)">
        </ion-input>
      </ion-item>

      <ion-item>
        <ion-input 
          class="animated-input" 
          placeholder="CPF"
          formControlName="cpf"
          type="text"
          inputmode="numeric"
          maxlength="14"
          (input)="formatCPF($event); onInput($event)">
        </ion-input>
      </ion-item>

      <ion-item>
        <ion-input
          class="animated-input"
          placeholder="Senha(Mínimo 6 digitos)"
          formControlName="senha"
          [type]="showPassword ? 'text' : 'password'"
          (input)="onInput($event)">
        </ion-input>
        <ion-button
          class="eye-button"
          fill="clear"
          slot="end"
          (click)="showPassword = !showPassword">
          <ion-icon
            slot="icon-only"
            class="eye-icon"
            [name]="showPassword ? 'eye-off-outline' : 'eye-outline'">
          </ion-icon>
        </ion-button>
      </ion-item>
      <ion-item>
        <ion-input
          class="animated-input"
          placeholder="Confirmar Senha"
          formControlName="confirmarSenha"
          [type]="showConfirmPassword ? 'text' : 'password'"
          (input)="onInput($event)">
        </ion-input>
        <ion-button
          class="eye-button"
          fill="clear"
          slot="end"
          (click)="showConfirmPassword = !showConfirmPassword">
          <ion-icon
            slot="icon-only"
            class="eye-icon"
            [name]="showConfirmPassword ? 'eye-off-outline' : 'eye-outline'">
          </ion-icon>
        </ion-button>
      </ion-item>

      <ion-button type="submit">Cadastrar</ion-button>
    </form>
    <div class="aga">
    <ion-text>Já possui cadastro?</ion-text>
    </div>
    <ion-text class="cadastro" (click)="gologin()">Clique aqui</ion-text>
  </ion-card>
</ion-content>
