<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" text="" icon="arrow-back-outline"></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="recarga-container">

    <!-- Valor exibido -->
    <div class="valor-section">
      <p class="label">Quanto você deseja recarregar?</p>
      <div class="valor-display">
        <input
          #valorInput
          type="tel"
          class="valor-texto"
          [class.zerado]="valorNumerico === 0"
          [value]="valorFormatado"
          (input)="onInput($event)"
        />
      </div>
      <div class="linha"></div>
    </div>

    <!-- Botões de atalho -->
    <div class="atalhos">
      <button class="atalho-btn" (click)="adicionarValor(1)">+1</button>
      <button class="atalho-btn" (click)="adicionarValor(10)">+10</button>
      <button class="atalho-btn" (click)="adicionarValor(100)">+100</button>
    </div>

    <!-- Botão continuar -->
    <div class="footer-section">
      <button class="btn-continuar" (click)="continuar()" [disabled]="valorNumerico === 0">
        Continuar com mercado pago
        <ion-icon name="arrow-forward-outline"></ion-icon>
      </button>
    </div>

  </div>
</ion-content>
