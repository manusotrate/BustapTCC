<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" text="" icon="arrow-back-outline"></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content (click)="fecharTeclado($event)">
  <div class="recarga-container">

    <!-- Valor exibido -->
    <div class="valor-section">
      <p class="label">Quanto você deseja recarregar?</p>

      <div
        class="valor-display"
        (click)="abrirTeclado($event)">
        <span class="valor-texto" [class.zerado]="valorNumerico === 0">{{ valorFormatado }}</span>
        <span class="cursor" [class.ativo]="tecladoAberto">|</span>
      </div>

      <div class="linha" [class.ativa]="tecladoAberto"></div>

      <!-- Botões de atalho -->
      <div class="atalhos">
        <button class="atalho-btn" (click)="adicionar(1, $event)">+1</button>
        <button class="atalho-btn" (click)="adicionar(10, $event)">+10</button>
        <button class="atalho-btn" (click)="adicionar(100, $event)">+100</button>
      </div>
    </div>

    <div class="spacer"></div>

    <!-- Botão continuar -->
    <div class="footer-section" [class.acima]="tecladoAberto">
      <button
        class="btn-continuar"
        (click)="continuar()"
        [disabled]="valorNumerico === 0">
        Continuar com mercado pago
        <ion-icon name="arrow-forward-outline"></ion-icon>
      </button>
    </div>

  </div>

  <!-- Teclado numérico customizado -->
  <div class="teclado-overlay" [class.visivel]="tecladoAberto" (click)="$event.stopPropagation()">
    <div class="teclado">
      <div class="teclado-grid">
        <button class="tecla" (click)="digitarNumero('1')">1</button>
        <button class="tecla" (click)="digitarNumero('2')">2</button>
        <button class="tecla" (click)="digitarNumero('3')">3</button>

        <button class="tecla" (click)="digitarNumero('4')">4</button>
        <button class="tecla" (click)="digitarNumero('5')">5</button>
        <button class="tecla" (click)="digitarNumero('6')">6</button>

        <button class="tecla" (click)="digitarNumero('7')">7</button>
        <button class="tecla" (click)="digitarNumero('8')">8</button>
        <button class="tecla" (click)="digitarNumero('9')">9</button>

        <button class="tecla tecla-vazia"></button>
        <button class="tecla" (click)="digitarNumero('0')">0</button>
        <button class="tecla tecla-apagar" (click)="apagar()">
          <ion-icon name="backspace-outline"></ion-icon>
        </button>
      </div>
    </div>
  </div>

</ion-content>
